# Codemagic CI/CD Configuration for React + Vite + Capacitor (Android)
# This workflow automatically builds your project and generates a downloadable APK file on every push or pull request.

workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 60
    environment:
      node: latest
      java: 17
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci || npm install
      - name: Build Web Application
        script: |
          npm run build
      - name: Capacitor Sync Assets
        script: |
          npx cap sync android
      - name: Fix and Configure Gradle Wrapper
        script: |
          # 1. Detect Gradle version and download a fresh, uncorrupted wrapper jar
          GRADLE_VERSION=$(grep -oE 'gradle-[0-9]+\.[0-9]+(\.[0-9]+)?' android/gradle/wrapper/gradle-wrapper.properties | head -n 1 | cut -d'-' -f2)
          echo "Detected Gradle version from properties: $GRADLE_VERSION"
          if [ -n "$GRADLE_VERSION" ]; then
            echo "Downloading clean gradle-wrapper.jar for version $GRADLE_VERSION..."
            curl -L -o android/gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v$GRADLE_VERSION/gradle/wrapper/gradle-wrapper.jar"
          else
            echo "Could not detect Gradle version. Downloading fallback version 8.14.3..."
            curl -L -o android/gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar"
          fi
          
          # 2. Fix Windows carriage return line endings (\r) in gradlew if edited on Windows
          sed -i 's/\r$//' android/gradlew
          
          # 3. Set executable permission for gradlew
          chmod +x android/gradlew
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
